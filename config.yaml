# config.yaml – BBH-AI Configuration
# Sensitive values must be set as environment variables.
# Run: export OPENAI_API_KEY=sk-... etc. before launching.

llm:
  openai_api_key:    "${OPENAI_API_KEY}"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  google_api_key:    "${GOOGLE_API_KEY}"
  deepseek_api_key:  "${DEEPSEEK_API_KEY}"   # Uses OpenAI-compatible endpoint
  default_model:     "gpt-4"
  temperature:       0.2

agents:
  planner:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.3
  recon:
    enabled:     true
    model:       "gpt-3.5-turbo"
    temperature: 0.1
  exploit:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.2
  reporter:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.0

sandbox:
  enabled:       true
  image:         "bbh-ai-unified"
  network:       "bridge"       # Changed to bridge to allow tool connectivity
  memory_limit:  "2g"          # Increased for heavy scans
  cpu_limit:     2.0           # Increased for multi-threaded tools
  ephemeral:     true

scan:
  mode:          "deep"
  threads:       10
  rate_limit:    5
  timeout:       300           # Increased for OSINT and Vuln scans
  js_file_limit: 25
  # whether to run the AI-powered VulnerabilityAnalyzer in phase E
  use_vuln_analyzer: true

tools:
  osint:
    whois: {}
    emailfinder: {}
  github:
    token: "${GITHUB_TOKEN}"
  subdomains:
    puredns:
      resolvers: "/app/resolvers.txt"
  vuln:
    interactsh:
      server: "interact.sh"
      # token: "" # Add token if using a private server

reporting:
  formats:            ["markdown", "json", "csv"]
  output_dir:         "runs"
  include_poc:        true
  include_screenshots: false   # Set true when screenshot tools are available

ci:
  enabled:       false
  exit_codes:    true           # Exit 1=critical, 2=high, 0=clean
  slack_webhook: "${SLACK_WEBHOOK_URL}"
  github_token:  "${GITHUB_TOKEN}"