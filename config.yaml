# config.yaml – BBH-AI Configuration
# Sensitive values must be set as environment variables.
# Run: export OPENAI_API_KEY=sk-... etc. before launching.

llm:
  openai_api_key:    "${OPENAI_API_KEY}"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  google_api_key:    "${GOOGLE_API_KEY}"
  deepseek_api_key:  "${DEEPSEEK_API_KEY}"   # Uses OpenAI-compatible endpoint
  default_model:     "gpt-4"
  temperature:       0.2

agents:
  planner:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.3
  recon:
    enabled:     true
    model:       "gpt-3.5-turbo"
    temperature: 0.1
  exploit:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.2
  reporter:
    enabled:     true
    model:       "gpt-4"
    temperature: 0.0

sandbox:
  enabled:       true
  image:         "bb-sandbox"
  network:       "none"        # Options: none, bridge, host
  memory_limit:  "1g"          # RAM limit per sandbox (e.g. 512m, 1g)
  cpu_limit:     1.0           # CPU core limit (e.g. 0.5, 1.0)
  ephemeral:     true          # Destroy container after use

scan:
  mode:          "deep"        # quick / deep / stealth
  threads:       10            # Concurrent tool execution threads
  rate_limit:    5             # Max tool invocations per second (0 = unlimited)
  timeout:       60            # Seconds per tool call (used by all wrappers)
  js_file_limit: 15            # Max JS files to parse per scan (reduces noise/CPU)

reporting:
  formats:            ["markdown", "json", "csv"]
  output_dir:         "runs"
  include_poc:        true
  include_screenshots: false   # Set true when screenshot tools are available

ci:
  enabled:       false
  exit_codes:    true           # Exit 1=critical, 2=high, 0=clean
  slack_webhook: "${SLACK_WEBHOOK_URL}"
  github_token:  "${GITHUB_TOKEN}"